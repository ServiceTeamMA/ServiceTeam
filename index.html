<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Service Team MA – Auftragsübersicht</title>
<style>
:root {
  --primary:#1e40af; --primary-l:#3b82f6; --primary-xl:#eff6ff;
  --bg:#f1f5f9; --card:#fff; --border:#e2e8f0;
  --text:#1e293b; --muted:#64748b;
  --green:#15803d; --green-l:#dcfce7;
  --red:#b91c1c; --red-l:#fee2e2;
  --radius:12px; --shadow:0 1px 4px rgba(0,0,0,.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}
.header-logo svg{width:28px;height:28px;flex-shrink:0}
.header-right{display:flex;gap:8px}
.icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:rgba(255,255,255,.25)}

/* ── Tabs ── */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border)}
.tab{flex:1;padding:13px;font-weight:600;font-size:14px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;text-align:center;transition:all .2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Views ── */
.view{display:none}.view.active{display:block}

/* ── Stats ── */
.stats{display:flex;gap:10px;padding:14px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stat{background:var(--card);border-radius:var(--radius);padding:12px 14px;min-width:90px;text-align:center;box-shadow:var(--shadow);flex-shrink:0}
.stat-num{font-size:22px;font-weight:700}.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Filters ── */
.filters{padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--border)}
.filters input,.filters select{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;background:#fff;transition:border-color .2s}
.filters input:focus,.filters select:focus{border-color:var(--primary-l)}
.filters input{flex:1;min-width:160px}

/* ── Table (Büro) ── */
.tbl-wrap{overflow-x:auto;padding:0 16px 80px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:14px;font-size:13px}
th{background:#f8fafc;padding:9px 11px;text-align:left;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .15s}
tbody tr:hover td{background:#f8fafc}

/* ── Status badge ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-offen{background:#dbeafe;color:#1d4ed8}
.b-angebot{background:#f1f5f9;color:#475569}
.b-angenommen{background:#dcfce7;color:#15803d}
.b-abgelehnt{background:#fee2e2;color:#b91c1c}
.b-durchgeführt{background:#ccfbf1;color:#0f766e}
.b-rech-schreiben{background:#ffedd5;color:#c2410c}
.b-rech-gesendet{background:#ede9fe;color:#6d28d9}
.b-zahlung{background:#d1fae5;color:#065f46}
.b-zurück{background:#fef9c3;color:#854d0e}

/* ── Cards (Team) ── */
.cards{padding:14px 16px 90px;display:grid;gap:12px}
@media(min-width:600px){.cards{grid-template-columns:1fr 1fr}}
@media(min-width:960px){.cards{grid-template-columns:1fr 1fr 1fr}}
.card{background:#fff;border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;border-left:4px solid var(--primary-l)}
.card:active{transform:scale(.98)}
.card:hover{box-shadow:var(--shadow-lg)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.card-nr{font-weight:700;font-size:14px;color:var(--primary)}
.card-addr{font-size:13px;font-weight:600;margin-bottom:5px}
.card-desc{font-size:12px;color:var(--muted);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(30,64,175,.45);display:flex;align-items:center;justify-content:center;z-index:50;transition:transform .15s}
.fab:hover{transform:scale(1.07)}

/* ── Modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
@media(min-width:640px){.overlay{align-items:center}}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 18px}
@media(min-width:640px){.modal{border-radius:16px;max-width:640px;max-height:88vh}}
.modal-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-title{font-size:17px;font-weight:700;line-height:1.3}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1}

/* ── Info grid ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-item{background:#f8fafc;border-radius:8px;padding:10px 12px}
.info-item .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:3px;letter-spacing:.4px}
.info-item .val{font-size:13px;white-space:pre-line;line-height:1.4}
.info-item.full{grid-column:span 2}

/* ── Form ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.fg select,.fg textarea,.fg input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:#fff}
.fg select:focus,.fg textarea:focus,.fg input:focus{border-color:var(--primary-l)}
.fg textarea{resize:vertical;min-height:80px}

/* ── Photo zone ── */
.pzone{border:2px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .2s}
.pzone:hover,.pzone.drag{border-color:var(--primary-l);background:var(--primary-xl)}
.pzone-icon{font-size:30px;margin-bottom:6px}
.pzone-txt{font-size:13px;color:var(--muted)}
.pgrid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.pthumb{position:relative;width:76px;height:76px}
.pthumb img{width:100%;height:100%;object-fit:cover;border-radius:8px;cursor:pointer}
.premove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#dc2626;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── Buttons ── */
.btn{padding:11px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:opacity .2s,transform .1s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-row{display:flex;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}

/* ── Loading / Empty ── */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:#1e293b;color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;z-index:1000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}

/* ── Section divider ── */
.section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="rgba(255,255,255,0.15)"/><path d="M14 6l2 5h5l-4 3 2 5-5-3-5 3 2-5-4-3h5z" fill="#fff"/></svg>
    Service Team MA
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="loadData()" title="Aktualisieren">↻</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('buero')">📋 Büro</div>
  <div class="tab" onclick="switchTab('team')">👷 Team</div>
</div>

<!-- ══ BÜRO VIEW ══ -->
<div id="buero-view" class="view active">
  <div class="stats" id="buero-stats"></div>
  <div class="filters">
    <input type="text" id="b-search" placeholder="🔍 Suchen…" oninput="renderBuero()">
    <select id="b-status" onchange="renderBuero()">
      <option value="">Alle Status</option>
      <option>Offen</option><option>Angebot</option>
      <option>Angebot-angenommen</option><option>Angebot-abgelehnt</option>
      <option>Arbeit-durchgeführt</option><option>Rechnung-schreiben</option>
      <option>Rechnung-gesendet</option><option>Zahlungseingang</option>
      <option>Zurückgestellt</option>
    </select>
  </div>
  <div class="tbl-wrap">
    <div id="b-table"><div class="loading"><div class="spinner"></div>Wird geladen…</div></div>
  </div>
</div>

<!-- ══ TEAM VIEW ══ -->
<div id="team-view" class="view">
  <div class="filters">
    <input type="text" id="t-search" placeholder="🔍 Suchen…" oninput="renderTeam()">
    <select id="t-status" onchange="renderTeam()">
      <option value="">Alle Status</option>
      <option selected>Offen</option><option>Angebot</option>
      <option>Angebot-angenommen</option><option>Angebot-abgelehnt</option>
      <option>Arbeit-durchgeführt</option><option>Zurückgestellt</option>
      <option>Rechnung-schreiben</option><option>Rechnung-gesendet</option>
      <option>Zahlungseingang</option>
    </select>
  </div>
  <div class="cards" id="t-cards"><div class="loading"><div class="spinner"></div>Wird geladen…</div></div>
  <button class="fab" onclick="openNew()" title="Neuer Auftrag">+</button>
</div>

<!-- ══ TEAM DETAIL MODAL ══ -->
<div class="overlay" id="m-detail">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="d-title"></div>
        <div id="d-badge" style="margin-top:6px"></div>
      </div>
      <button class="modal-close" onclick="closeModal('m-detail')">✕</button>
    </div>
    <div class="info-grid" id="d-info"></div>
    <div class="fg">
      <label>Status ändern</label>
      <select id="d-status">
        <option>Offen</option><option>Angebot</option>
        <option>Angebot-angenommen</option><option>Angebot-abgelehnt</option>
        <option>Arbeit-durchgeführt</option><option>Rechnung-schreiben</option>
        <option>Rechnung-gesendet</option><option>Zahlungseingang</option>
        <option>Zurückgestellt</option>
      </select>
    </div>
    <div class="fg">
      <label>Mitarbeiter-Bericht</label>
      <textarea id="d-bericht" placeholder="Beschreibe die durchgeführten Arbeiten…"></textarea>
    </div>
    <div class="fg">
      <label>Fotos</label>
      <div class="pzone" id="pzone"
        onclick="document.getElementById('p-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="onDrop(event)">
        <div class="pzone-icon">📷</div>
        <div class="pzone-txt">Antippen zum Hochladen</div>
      </div>
      <input type="file" id="p-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this.files)">
      <div class="pgrid" id="pgrid"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('m-detail')">Abbrechen</button>
      <button class="btn btn-primary" style="flex:1" id="d-save-btn" onclick="saveDetail()">💾 Speichern</button>
    </div>
  </div>
</div>

<!-- ══ BÜRO DETAIL MODAL ══ -->
<div class="overlay" id="m-buero-detail">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-title" id="bd-title"></div>
        <div id="bd-badge" style="margin-top:6px"></div>
      </div>
      <button class="modal-close" onclick="closeModal('m-buero-detail')">✕</button>
    </div>
    <div class="info-grid" id="bd-info"></div>
    <div id="bd-fotos"></div>
    <div id="bd-bericht-section"></div>
    <div class="fg" style="margin-top:16px">
      <label>Status ändern</label>
      <select id="bd-status">
        <option>Offen</option><option>Angebot</option>
        <option>Angebot-angenommen</option><option>Angebot-abgelehnt</option>
        <option>Arbeit-durchgeführt</option><option>Rechnung-schreiben</option>
        <option>Rechnung-gesendet</option><option>Zahlungseingang</option>
        <option>Zurückgestellt</option>
      </select>
    </div>
    <div class="fg">
      <label>Rechnung Nr.</label>
      <input type="text" id="bd-rechnung" placeholder="z.B. RE0942">
    </div>
    <div class="fg">
      <label>Summe (€)</label>
      <input type="number" id="bd-summe" placeholder="0.00" step="0.01">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('m-buero-detail')">Schließen</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveBuero()">Speichern</button>
    </div>
  </div>
</div>

<!-- ══ NEUER AUFTRAG MODAL ══ -->
<div class="overlay" id="m-new">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title">➕ Neuer Auftrag</div>
      <button class="modal-close" onclick="closeModal('m-new')">✕</button>
    </div>
    <div class="fg"><label>Auftragsnummer *</label><input type="text" id="n-auftrag" placeholder="z.B. Auftrag 8001220284"></div>
    <div class="fg"><label>Datum</label><input type="date" id="n-datum"></div>
    <div class="fg"><label>Anschrift</label><textarea id="n-anschrift" placeholder="Straße Nr&#10;PLZ Ort&#10;Etage&#10;Whg: …"></textarea></div>
    <div class="fg"><label>Beschreibung</label><textarea id="n-beschreibung" placeholder="Was ist zu tun?"></textarea></div>
    <div class="fg"><label>Auftraggeber</label><textarea id="n-auftraggeber" placeholder="Firmenname&#10;Adresse&#10;Tel"></textarea></div>
    <div class="fg"><label>Mieter</label><textarea id="n-mieter" placeholder="Name&#10;Telefon&#10;E-Mail"></textarea></div>
    <div class="fg"><label>Melder / Hausmeister</label><textarea id="n-melder" placeholder="Hausmeister&#10;Name&#10;Telefon"></textarea></div>
    <div class="fg">
      <label>Status</label>
      <select id="n-status">
        <option>Offen</option><option>Angebot</option><option>Angebot-angenommen</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('m-new')">Abbrechen</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveNew()">✓ Anlegen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Config ─────────────────────────────────────────────────────────────────
const SB_URL = 'https://dzauqisqkkwsbouduuec.supabase.co';
const SB_KEY = 'sb_publishable_wxXk85D1enG68N9X1zLpiQ_Hqf18uFO';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ── State ──────────────────────────────────────────────────────────────────
let data = [];
let cur = null;       // current open order
let exPhotos = [];    // existing photo URLs
let newPhotos = [];   // {file, preview}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const { data: rows, error } = await sb.from('auftraege').select('*').order('id', { ascending: false });
    if (error) throw error;
    data = rows || [];
    renderStats();
    renderBuero();
    renderTeam();
  } catch(e) {
    toast('Fehler beim Laden: ' + e.message, 'err');
  }
}

// ── Status badge ────────────────────────────────────────────────────────────
const BADGE = {
  'Offen':'b-offen','Angebot':'b-angebot',
  'Angebot-angenommen':'b-angenommen','Angebot-abgelehnt':'b-abgelehnt',
  'Arbeit-durchgeführt':'b-durchgeführt','Rechnung-schreiben':'b-rech-schreiben',
  'Rechnung-gesendet':'b-rech-gesendet','Zahlungseingang':'b-zahlung',
  'Zurückgestellt':'b-zurück'
};
const CARD_COLOR = {
  'Offen':'#3b82f6','Angebot-angenommen':'#16a34a','Arbeit-durchgeführt':'#0d9488',
  'Zurückgestellt':'#d97706','Rechnung-schreiben':'#ea580c',
  'Rechnung-gesendet':'#7c3aed','Zahlungseingang':'#15803d'
};
function badge(s){ return `<span class="badge ${BADGE[s]||'b-angebot'}">${s||'–'}</span>`; }

// ── Stats (nur 2026, alle vorhandenen Status dynamisch) ────────────────────
function renderStats() {
  const d26 = data.filter(r => r.jahr === 2026);
  const c = {};
  d26.forEach(r => { const s = r.status||'–'; c[s] = (c[s]||0)+1; });
  // Farbzuordnung je Status
  const COL = {
    'Offen':'#2563eb','Angebot':'#64748b',
    'Angebot-angenommen':'#16a34a','Angebot-abgelehnt':'#dc2626',
    'Arbeit-durchgeführt':'#0d9488','Rechnung-schreiben':'#ea580c',
    'Rechnung-gesendet':'#7c3aed','Zahlungseingang':'#15803d',
    'Zurückgestellt':'#d97706'
  };
  // Gesamt zuerst, dann alle Status mit Anzahl > 0 sortiert nach Häufigkeit
  const statusItems = Object.entries(c)
    .sort((a,b) => b[1]-a[1])
    .map(([s,n]) => ({lbl:s, n, col:COL[s]||'#64748b'}));
  const all = [{lbl:'Gesamt 2026', n:d26.length, col:'#1e40af'}, ...statusItems];
  document.getElementById('buero-stats').innerHTML = all.map(i =>
    `<div class="stat"><div class="stat-num" style="color:${i.col}">${i.n}</div><div class="stat-lbl" style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${i.lbl}">${i.lbl}</div></div>`
  ).join('');
}

// ── Filter ─────────────────────────────────────────────────────────────────
function filtered(searchId, statusId) {
  const q = (document.getElementById(searchId).value||'').toLowerCase();
  const st = document.getElementById(statusId).value;
  return data.filter(r => {
    if (st && r.status !== st) return false;
    if (q) return [r.auftrag,r.anschrift,r.beschreibung,r.auftraggeber,r.mieter,r.melder,r.rechnung]
      .some(f => f && f.toLowerCase().includes(q));
    return true;
  });
}

// ── Büro ───────────────────────────────────────────────────────────────────
function renderBuero() {
  const rows = filtered('b-search','b-status');
  if (!rows.length) {
    document.getElementById('b-table').innerHTML = '<div class="loading">Keine Einträge gefunden</div>';
    return;
  }
  document.getElementById('b-table').innerHTML = `<table>
    <thead><tr>
      <th>Pos</th><th>Auftrag</th><th>Datum</th><th>Anschrift</th><th>Beschreibung</th>
      <th>Status</th><th>Auftraggeber</th><th>Rechnung</th><th>Summe</th><th>Melder</th><th>Mieter</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr onclick="openBueroDetail(${r.id})">
      <td><b>${r.pos||'–'}</b></td>
      <td style="white-space:nowrap">${r.auftrag||'–'}</td>
      <td style="white-space:nowrap">${r.datum||'–'}</td>
      <td style="min-width:130px;white-space:pre-line">${r.anschrift||'–'}</td>
      <td style="min-width:180px">${r.beschreibung||'–'}</td>
      <td>${badge(r.status)}</td>
      <td style="min-width:130px;white-space:pre-line">${r.auftraggeber||'–'}</td>
      <td>${r.rechnung||'–'}</td>

  const navBtn = cur.anschrift
    ? `<button onclick="navigateTo('${(cur.anschrift||'').replace(/\n/g,', ').replace(/'/g,"\\'")}');event.stopPropagation()"
        style="margin-top:6px;display:inline-flex;align-items:center;gap:5px;background:var(--primary);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">
        🧭 Navigation starten</button>`
    : '';

  const fields = [
    {l:'Datum',v:cur.datum},{l:'Pos.',v:cur.pos ? `#${cur.pos}` : null},
    {l:'Anschrift',v:cur.anschrift,f:1,extra:navBtn},{l:'Beschreibung',v:cur.beschreibung,f:1},
    {l:'Mieter',v:cur.mieter,f:1},{l:'Auftraggeber',v:cur.auftraggeber,f:1},
    {l:'Melder',v:cur.melder,f:1},
  ].filter(f=>f.v);
  document.getElementById('d-info').innerHTML = fields.map(f=>
    `<div class="info-item ${f.f?'full':''}"><div class="lbl">${f.l}</div><div class="val">${f.v}</div>${f.extra||''}</div>`
  ).join('');
  renderPgrid();
  document.getElementById('m-detail').classList.add('open');
}

function renderPgrid() {
  document.getElementById('pgrid').innerHTML =
    exPhotos.map((u,i)=>`<div class="pthumb"><img src="${u}" onclick="window.open('${u}','_blank')"><button class="premove" onclick="exPhotos.splice(${i},1);renderPgrid()">×</button></div>`).join('') +
    newPhotos.map((p,i)=>`<div class="pthumb"><img src="${p.prev}"><button class="premove" onclick="newPhotos.splice(${i},1);renderPgrid()">×</button></div>`).join('');
}

function addPhotos(files) {
  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{newPhotos.push({file:f,prev:e.target.result});renderPgrid()};
    r.readAsDataURL(f);
  });
}
function onDrop(e){e.preventDefault();document.getElementById('pzone').classList.remove('drag');addPhotos(e.dataTransfer.files)}

async function uploadAll() {
  const urls=[...exPhotos];
  for(const p of newPhotos){
    const name=`${Date.now()}_${p.file.name.replace(/[^a-z0-9.]/gi,'_')}`;
    const {error}=await sb.storage.from('bilder').upload(name,p.file,{contentType:p.file.type});
    if(error) throw error;
    const {data:pub}=sb.storage.from('bilder').getPublicUrl(name);
    urls.push(pub.publicUrl);
  }
  return urls;
}

async function saveDetail() {
  if(!cur) return;
  const btn=document.getElementById('d-save-btn');
  btn.disabled=true; btn.textContent='Speichern…';
  try {
    const bilder = await uploadAll();
    const upd = {
      status: document.getElementById('d-status').value,
      mitarbeiter_bericht: document.getElementById('d-bericht').value||null,
      bilder,
      updated_at: new Date().toISOString()
    };
    const {error}=await sb.from('auftraege').update(upd).eq('id',cur.id);
    if(error) throw error;
    Object.assign(cur,upd);
    const idx=data.findIndex(r=>r.id===cur.id);
    if(idx>=0) Object.assign(data[idx],upd);
    renderTeam(); renderBuero(); renderStats();
    closeModal('m-detail');
    toast('Gespeichert ✓','ok');
  } catch(e){ toast('Fehler: '+e.message,'err'); }
  finally{ btn.disabled=false; btn.textContent='💾 Speichern'; }
}
